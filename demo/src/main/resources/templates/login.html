<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Spring Security</title>
    <style>

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fce4ec; /* Fond rose très clair */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
            border-top: 5px solid #d81b60; /* Bordure rose foncé en haut */
        }

        h2 { color: #880e4f; text-align: center; margin-bottom: 25px; }
        label { display: block; margin-bottom: 5px; color: #444; font-weight: bold; }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; /* Pour que le padding ne dépasse pas */
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #ad1457; /* Bouton rose foncé */
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover { background-color: #880e4f; }
        .error-message {
            color: #d32f2f;
            background-color: #ffcdd2;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Authentification</h2>

    <div th:if="${param.error}" class="error-message">
        Nom d'utilisateur ou mot de passe incorrect.
    </div>

    <div th:if="${param.logout}" style="color: green; text-align: center; margin-bottom: 15px;">
        Vous avez été déconnecté.
    </div>

    <form th:action="@{/login}" method="post">
        <div>
            <label>Nom d'utilisateur :</label>
            <input type="text" name="username" required autofocus />
        </div>

        <div>
            <label>Mot de passe :</label>
            <input type="password" name="password" required />
        </div>

        <button type="submit">Se connecter</button>
    </form>

</div>

</body>
</html>
